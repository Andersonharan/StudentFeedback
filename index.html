<!DOCTYPE html>
<html>
<head>
<title>Pufferfish Session Feedback</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#f5f7fa;
}

h1{
  font-size:42px;
  text-align:center;
  margin-bottom:20px;
}

.question{
  font-size:26px;
  margin-top:30px;
  margin-bottom:10px;
  text-align:center;
}

.buttons{
  display:flex;
  gap:40px;
  margin-bottom:10px;
}

button{
  width:180px;
  height:180px;
  font-size:70px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  transition:0.2s;
  background:white;
}

button:hover{
  transform:scale(1.08);
}

#message{
  margin-top:25px;
  font-size:28px;
  font-weight:bold;
  height:40px;
}

#stats{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:18px;
  background:white;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Session Feedback</h1>

<!-- QUESTION 1 -->
<div class="question">How much did you enjoy today’s session?</div>

<div class="buttons">
<button onclick="vote('enjoy', 'bad')">🙁</button>
<button onclick="vote('enjoy', 'neutral')">😐</button>
<button onclick="vote('enjoy', 'good')">🙂</button>
</div>

<!-- QUESTION 2 -->
<div class="question">How useful was today’s session?</div>

<div class="buttons">
<button onclick="vote('useful', 'bad')">🙁</button>
<button onclick="vote('useful', 'neutral')">😐</button>
<button onclick="vote('useful', 'good')">🙂</button>
</div>

<div id="message"></div>

<div id="stats">
<h3>Live Stats</h3>

<b>Enjoy</b><br>
🙁 <span id="enjoy_bad">0</span> |
😐 <span id="enjoy_neutral">0</span> |
🙂 <span id="enjoy_good">0</span>

<br><br>

<b>Useful</b><br>
🙁 <span id="useful_bad">0</span> |
😐 <span id="useful_neutral">0</span> |
🙂 <span id="useful_good">0</span>
</div>

<script>
let counts = {
  enjoy: { bad:0, neutral:0, good:0 },
  useful: { bad:0, neutral:0, good:0 }
};

function vote(question, type){
  counts[question][type]++;

  document.getElementById(question + '_' + type).innerText =
    counts[question][type];

  document.getElementById('message').innerText = '✅ Thank you!';

  setTimeout(()=>{
    document.getElementById('message').innerText = '';
  },2000);
}
</script>

</body>
</html>
